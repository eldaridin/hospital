server:
  port: 8090

spring:
  application:
    name: hospitalization-service
    datasource:
          url: jdbc:h2:mem:hospitalizationdb
          driverClassName: org.h2.Driver
          username: sa
          password: password
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
      ddl-auto: update
    h2:
      console:
        enabled: true

    springdoc:
      api-docs:
        path: /api-docs
    swagger-ui:
      path: /swagger-ui.html