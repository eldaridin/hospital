server:
  port: 8090

spring:
  application:
    name: hospitalization-service

  datasource:
    # URL limpia de parámetros MySQL, usando el formato correcto para H2
    url: jdbc:h2:mem:hospitalizationdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # Consola web de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      # Como no tienes Flyway en este, 'update' es perfecto para que cree las tablas
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Tu configuración de Swagger se mantiene intacta
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html