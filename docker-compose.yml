services:
  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  patient-service:
    build: ./patient-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  appointment-service:
    build: ./appointment-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - patient-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  doctor-service:
    build: ./doctor-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - patient-service
      - appointment-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  auth-service:
    build: ./auth-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  prescription-service:
    build: ./prescription-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - appointment-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  inventory-service:
    build: ./inventory-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  pharmacy-service:
    build: ./pharmacy-service
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

