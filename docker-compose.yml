services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: hospital_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - mysql_data;

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  patient-service:
    build: ./patient-service
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  appointment-service:
    build: ./appointment-service
    ports:
      - "8082:8082"
    depends_on:
      - eureka-server
      - patient-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  doctor-service:
    build: ./doctor-service
    ports:
      - "8083:8083"
    depends_on:
      - eureka-server
      - patient-service
      - appointment-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  auth-service:
    build: ./auth-service
    ports:
      - "8084:8084"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  prescription-service:
    build: ./prescription-service
    ports:
      - "8085:8085"
    depends_on:
      - eureka-server
      - appointment-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  inventory-service:
    build: ./inventory-service
    ports:
      - "8086:8086"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  pharmacy-service:
    build: ./pharmacy-service
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  notification-service:
    build: ./notification-service
    ports:
      - "8088:8088"
    depends_on:
      - eureka-server
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  billing-service:
    build: ./billing-service
    ports:
      - "8089:8089"
    depends_on:
      - eureka-server
      - pharmacy-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/

  hospitalization-service:
    build: ./hospitalization-service
    ports:
      - "8010:8010"
    depends_on:
      - eureka-server
      - prescription-service
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/