server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false # Evita que se registre a sí mismo
    fetch-registry: false       # No necesita buscar un registro externo
  server:
    wait-time-in-ms-when-sync-empty: 0 # Arranca de inmediato sin esperar a otros servidores