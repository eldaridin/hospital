server:
  port: 8082

spring:
  application:
    name: appointment-service

  datasource:
    # Base de datos en memoria con modo de compatibilidad para MySQL
    url: jdbc:h2:mem:appointment_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Configuración útil para ver la base de datos desde el navegador
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html