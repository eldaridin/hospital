      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mysql-db:3306/appointment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: rootpass

