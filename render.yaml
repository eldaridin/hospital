# render.yaml
services:
  # ---------------------------------------------------------
  # 1. INFRAESTRUCTURA Y BASES DE DATOS (Servicios Privados)
  # ---------------------------------------------------------

  - type: pserv
    name: mysql-db
    env: docker
    image: mysql:8.0
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: rootpass # En producción, usa el gestor de secretos de Render
      - key: MYSQL_DATABASE
        value: hospital_db

  - type: pserv
    name: rabbitmq
    env: docker
    image: rabbitmq:3-management
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 1

  - type: redis
    name: redis-cache
    plan: free # Render ofrece un Redis nativo gestionado
    ipAllowList: [] # Permite conexiones internas por defecto

  # ---------------------------------------------------------
  # 2. DISCOVERY SERVER (Servicio Privado)
  # ---------------------------------------------------------

  - type: pserv
    name: eureka-server
    env: docker
    dockerContext: ./eureka-server
    dockerfilePath: ./eureka-server/Dockerfile
    plan: free

  # ---------------------------------------------------------
  # 3. WEB SERVICE PRINCIPAL (Público)
  # ---------------------------------------------------------

  - type: web
    name: api-gateway
    env: docker
    dockerContext: ./api-gateway
    dockerfilePath: ./api-gateway/Dockerfile
    plan: free
    envVars:
      # Render enruta el tráfico interno automáticamente usando el nombre del servicio
      - key: EUREKA_URL
        value: http://eureka-server:8761/eureka/

  # ---------------------------------------------------------
  # 4. MICROSERVICIOS DE NEGOCIO (Servicios Privados)
  # ---------------------------------------------------------

  - type: pserv
    name: patient-service
    env: docker
    dockerContext: ./patient-service
    dockerfilePath: ./patient-service/Dockerfile
    plan: free
    envVars:
      - key: EUREKA_URL
        value: http://eureka-server:8761/eureka/
      - key: SPRING_DATASOURCE_URL
        # Fíjate cómo conectamos a la BD usando el nombre del servicio "mysql-db"
        value: jdbc:mysql://mysql-db:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - key: SPRING_DATASOURCE_USERNAME
        value: root
      - key: SPRING_DATASOURCE_PASSWORD
        value: rootpass

  - type: pserv
    name: appointment-service
    env: docker
    dockerContext: ./appointment-service
    dockerfilePath: ./appointment-service/Dockerfile
    plan: free
    envVars:
      - key: EUREKA_URL
