

services:
  # ==========================================
  # INFRAESTRUCTURA BASE
  # ==========================================
  - type: redis
    name: hospital-redis
    plan: free

  # ==========================================
  # MICROSERVICIOS
  # ==========================================
  - type: web
    name: eureka-server
    env: java
    plan: free
    rootDirectory: ./render/docker/eureka-server.Dockerfile
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8761

  - type: web
    name: api-gateway
    env: java
    plan: free
    rootDirectory: ./render/docker/api-gateway.Dockerfile
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_URL
        value: http://eureka-server:8761/eureka/

