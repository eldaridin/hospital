# render.yaml
# Despliegue completo de Arquitectura de Microservicios Hospitalarios

services:
  # ==========================================
  # INFRAESTRUCTURA BASE
  # ==========================================
  - type: redis
    name: hospital-redis
    plan: free
    ipAllowList: []

  # ==========================================
  # MICROSERVICIOS
  # ==========================================
  - type: web
    name: hospital-eureka-server
    runtime: docker
    plan: free
    dockerfilePath: ./eureka-server/Dockerfile
    dockerContext: ./eureka-server
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8761

  - type: web
    name: hospital-api-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: EUREKA_URL
        value: https://hospital-eureka-server.onrender.com/eureka/

  - type: web
    name: hospital-patient-service
    runtime: docker
    plan: free
    dockerfilePath: ./patient-service/Dockerfile
    dockerContext: ./patient-service
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8081
      - key: EUREKA_URL
        value: https://hospital-eureka-server.onrender.com/eureka/

