server:
  port: 8084

spring:
  application:
    name: auth-service

  datasource:
    # Base de datos en memoria para el auth_db con modo compatibilidad MySQL
    url: jdbc:h2:mem:auth_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Consola web para administrar la base de datos de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
# Tu configuración personalizada se mantiene igual
jwt:
  secret: ClaveHospital123
  expiration-ms: 3600000