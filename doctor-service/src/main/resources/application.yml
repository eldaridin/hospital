server:
  port: 8083

spring:
  application:
    name: doctor-service

  datasource:
    # Base de datos en memoria para doctor_db con modo compatibilidad MySQL
    url: jdbc:h2:mem:doctor_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Consola web para administrar la base de datos de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway se encargará de crear las tablas al arrancar
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
# La configuración de Eureka se mantiene igual
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/