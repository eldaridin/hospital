server:
  port: 8086

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_inventario?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect