server:
  port: 8086

spring:
  application:
    name: inventory-service

  datasource:

    url: jdbc:h2:mem:db_inventario;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver


  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:

      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html