server:
  port: 8088

spring:
  application:
    name: notification-service

  datasource:

    url: jdbc:h2:mem:notificationdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:


  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect


springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html